name: Auto Update Baikal

on:
  schedule:
    - cron: "0 21 * * *" 
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Baikal version
        id: latest
        run: |
          VERSION=$(curl -s https://api.github.com/repos/sabre-io/Baikal/releases/latest | grep tag_name | cut -d '"' -f 4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep BAIKAL_VERSION Dockerfile | cut -d '=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Dockerfile if needed
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          sed -i "s/BAIKAL_VERSION=.*/BAIKAL_VERSION=${{ steps.latest.outputs.version }}/" Dockerfile

      - name: Commit and push update
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "Auto update Baikal to ${{ steps.latest.outputs.version }}"
          git push
